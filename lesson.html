<!-- FILE: templates/lesson.html -->
<!DOCTYPE html>
<html>
<head>
    <title>{{ lesson[1] }} - Learnify</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container" style="margin-top:30px;">
    <h2>{{ lesson[1] }}</h2>
    <p>{{ lesson[3] if lesson[3] else "" }}</p>

    {% if 'youtube.com' in lesson[2] %}
        <iframe width="100%" height="400" src="{{ lesson[2] }}" frameborder="0" allowfullscreen></iframe>
    {% else %}
        <video controls style="width:100%; max-height:400px;">
            <source src="{{ lesson[2] }}" type="video/mp4">
        </video>
    {% endif %}

    <br><br>
    <a href="/quiz/{{ lesson[0] }}" class="button">Take Quiz</a>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<a href="/dashboard" class="btn btn-secondary" style="margin-top:10px;">Back to Dashboard</a>
</body>
</html>
