<!-- FILE: templates/login.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Login - Learnify</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav style="background-color:#007bff; padding:15px;">
    <div style="display:flex; justify-content:space-between; color:white;">
        <h1 style="margin:0;">Learnify</h1>
        <div>
            <a href="/" style="color:white; margin-right:15px; text-decoration:none;">Home</a>
            <a href="/login" style="color:white; margin-right:15px; text-decoration:none;">Login</a>
            <a href="/register" style="color:white; text-decoration:none;">Register</a>
        </div>
    </div>
</nav>

<div class="container" style="max-width:400px; margin-top:50px;">
    <h2 style="text-align:center;">Login</h2>
    <form method="POST" style="display:flex; flex-direction:column; gap:15px; margin-top:30px;">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="button">Login</button>
    </form>
    <p style="text-align:center; margin-top:10px;">No account? <a href="/register">Register here</a></p>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
